name: Auto-assign issues to Codex

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  assign-to-codex:
    runs-on: ubuntu-latest
    steps:
      - name: Assign issue to Codex
        uses: actions/github-script@v7
        with:
          script: |
            // Assign Codex bot via GraphQL (REST API can't assign bots)
            const issueNodeId = context.payload.issue.node_id;
            const codexBotNodeId = 'BOT_kgDODnSAjQ';
            await github.graphql(`
              mutation($assignableId: ID!, $assigneeIds: [ID!]!) {
                addAssigneesToAssignable(input: { assignableId: $assignableId, assigneeIds: $assigneeIds }) {
                  assignable { ... on Issue { number } }
                }
              }
            `, { assignableId: issueNodeId, assigneeIds: [codexBotNodeId] });

            // Add the 'codex' label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['codex']
            });

            // Add a comment to confirm assignment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🤖 **Assigned to Codex** — This issue has been labeled and assigned for automatic pickup by the Codex coding agent.\n\nWorkflow:\n1. Pull latest `main`\n2. Implement with tests\n3. Push directly to `main`\n4. Auto-close via commit message `fix #' + context.issue.number + '`'
            });
